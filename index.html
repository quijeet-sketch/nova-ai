<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova AI v5</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
color:white;
}

.header{
height:60px;
background:#111827;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
}

#home{
height:calc(100vh - 60px);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.logo{
font-size:70px;
margin-bottom:20px;
}

button{
padding:12px 20px;
background:#10b981;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

#chat{
display:none;
}

#chatBox{
height:75vh;
overflow-y:auto;
padding:10px;
}

.user{
background:#10b981;
padding:10px;
margin:10px;
border-radius:10px;
text-align:right;
}

.ai{
background:#1f2937;
padding:10px;
margin:10px;
border-radius:10px;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
gap:10px;
padding:10px;
background:#111827;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
}

</style>

</head>

<body>

<div class="header">🤖 Nova AI</div>

<div id="home">
<div class="logo">🤖</div>
<h2>Welcome to Nova AI</h2>
<p>Powered by Gemini</p>
<button onclick="openChat()">Start Chat</button>
</div>

<div id="chat">

<div id="chatBox">
<div class="ai">Hello! Main Nova AI hoon 🤖</div>
</div>

<div class="bottom">
<input id="msg" placeholder="Type message..." onkeydown="if(event.key==='Enter') send()">
<button onclick="send()">Send</button>
</div>

</div>

<script>

function openChat(){
document.getElementById("home").style.display="none";
document.getElementById("chat").style.display="block";
}

async function send(){

let input=document.getElementById("msg");
let text=input.value.trim();

if(!text) return;

let box=document.getElementById("chatBox");

// user msg
box.innerHTML += `<div class="user">${text}</div>`;
input.value="";
box.scrollTop=box.scrollHeight;

// typing
box.innerHTML += `<div class="ai" id="typing">Typing...</div>`;

try{

let res = await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
});

let data = await res.json();

document.getElementById("typing").remove();

box.innerHTML += `<div class="ai">${data.reply}</div>`;
box.scrollTop=box.scrollHeight;

}
catch(e){
document.getElementById("typing").remove();
box.innerHTML += `<div class="ai">Error ❌</div>`;
}

}

</script>

</body>
</html>
