<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova AI v4</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

.header{
    height:60px;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

#home{
    height:calc(100vh - 60px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.logo{
    font-size:80px;
    margin-bottom:20px;
}

#home h1{
    font-size:42px;
    margin-bottom:10px;
}

#home p{
    color:#bbb;
    margin-bottom:30px;
    font-size:18px;
}

button{
    background:#10b981;
    color:white;
    border:none;
    border-radius:12px;
    padding:14px 28px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#059669;
}

#chat{
    display:none;
}

#chatBox{
    height:calc(100vh - 140px);
    overflow-y:auto;
    padding:15px;
}

.ai{
    background:#1f2937;
    color:white;
    padding:12px;
    border-radius:15px;
    margin:10px 0;
    width:fit-content;
    max-width:80%;
    line-height:1.5;
}

.user{
    background:#10b981;
    color:white;
    padding:12px;
    border-radius:15px;
    margin:10px 0 10px auto;
    width:fit-content;
    max-width:80%;
    text-align:right;
    line-height:1.5;
}

.bottom{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111827;
    padding:10px;
    display:flex;
    gap:10px;
}

#message{
    flex:1;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:10px;
    outline:none;
    background:white;
    color:black;
}

.bottom button{
    width:100px;
}

::-webkit-scrollbar{
    width:5px;
}

::-webkit-scrollbar-thumb{
    background:#10b981;
    border-radius:10px;
}

</style>

</head>

<body>

<!-- Header -->

<div class="header">
🤖 Nova AI v4
</div>

<!-- Home Screen -->

<div id="home">

<div class="logo">
🤖
</div>

<h1>Nova AI</h1>

<p>Your Personal AI Assistant</p>

<button onclick="openChat()">
Start Chat
</button>

</div>

<!-- Chat Screen -->

<div id="chat">

<div id="chatBox">

<div class="ai">

👋 Hello! Main Nova AI hoon.

Aap mujhse kuch bhi pooch sakte hain.

</div>

</div>

<div class="bottom">

<input
id="message"
type="text"
placeholder="Type your message..."
onkeydown="enter(event)"
>

<button onclick="sendMessage()">

Send

</button>

</div>

</div>

<script>

function openChat(){

    document.getElementById("home").style.display="none";
    document.getElementById("chat").style.display="block";

}

function enter(event){

    if(event.key==="Enter"){
        sendMessage();
    }

}

function sendMessage(){

    let input=document.getElementById("message");
    let text=input.value.trim();

    if(text==="") return;

    let chatBox=document.getElementById("chatBox");

    // User Message
    chatBox.innerHTML+=`
    <div class="user">${text}</div>
    `;

    input.value="";

    chatBox.scrollTop=chatBox.scrollHeight;

    // Typing Effect

    setTimeout(function(){

        let reply=getReply(text);

        chatBox.innerHTML+=`
        <div class="ai">${reply}</div>
        `;

        chatBox.scrollTop=chatBox.scrollHeight;

    },700);

}

function getReply(text){

    text=text.toLowerCase();

    if(text.includes("hi") || text.includes("hello")){
        return "👋 Hello! Main Nova AI hoon.";
    }

    if(text.includes("kaise ho")){
        return "😊 Main bilkul theek hoon. Aap kaise ho?";
    }

    if(text.includes("time")){
        return "🕒 " + new Date().toLocaleTimeString();
    }

    if(text.includes("date")){
        return "📅 " + new Date().toLocaleDateString();
    }

    if(text.includes("name")){
        return "🤖 Mera naam Nova AI hai.";
    }

    const API_KEY = ".";
}

</script>

</body>

</html>
